<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sanación 11.11</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #f9e6ee;
    padding: 20px;
}
.container {
    max-width: 600px;
    margin: auto;
}
input, select, textarea {
    width: 100%;
    margin-bottom: 10px;
    padding: 8px;
}
button {
    padding: 12px;
    width: 100%;
    background: #8e3a8e;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Sanación 11.11 - Informe Premium</h2>

<input id="nombre" placeholder="Nombre del consultante">

<select id="intro">
<option>Durante la sesión se identificaron bloqueos energéticos que estaban afectando tu equilibrio.</option>
<option>Se accedió a información profunda sobre tu estado energético actual.</option>
<option>La lectura permitió comprender el origen de lo que estás sintiendo.</option>
</select>

<input id="signo" placeholder="Zona / Signo">
<textarea id="diagnostico" placeholder="Interpretación"></textarea>

<input id="bovisInicial" placeholder="Bovis inicial">
<input id="bovisFinal" placeholder="Bovis final">

<textarea id="conclusion" placeholder="Conclusión"></textarea>

<select id="frase">
<option>Cuando sanás tu pasado, tu presente florece y tu futuro se abre con luz.</option>
<option>Todo lo que liberás hoy, deja espacio para lo nuevo.</option>
<option>Tu energía en equilibrio es tu mayor poder.</option>
</select>

<button onclick="generarPDF()">Generar PDF</button>

</div>

<script>
async function generarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let nombre = document.getElementById("nombre").value;
    let intro = document.getElementById("intro").value;
    let signo = document.getElementById("signo").value;
    let diagnostico = document.getElementById("diagnostico").value;
    let conclusion = document.getElementById("conclusion").value;
    let frase = document.getElementById("frase").value;
    let bovisInicial = document.getElementById("bovisInicial").value;
    let bovisFinal = document.getElementById("bovisFinal").value;

    let y = 25;

    // HEADER
    doc.setFillColor(142, 58, 142);
    doc.rect(0, 0, 210, 30, "F");

    doc.setTextColor(255,255,255);
    doc.setFontSize(16);
    doc.text("Sanación 11.11", 10, 15);

    doc.setFontSize(10);
    doc.text("Informe energético personalizado", 10, 22);

    doc.setTextColor(0,0,0);

    // BLOQUE FUNCION
    function bloque(titulo, contenido) {
        doc.setFillColor(245, 220, 230);
        doc.rect(10, y-5, 190, 20, "F");

        doc.setFont(undefined, "bold");
        doc.text(titulo, 12, y);

        doc.setFont(undefined, "normal");
        doc.text(contenido, 12, y+6, { maxWidth: 180 });

        y += 22;
    }

    // NOMBRE
    doc.setFont(undefined, "bold");
    doc.text("Consultante: " + nombre, 10, y);
    y += 10;

    // BLOQUES
    bloque("Síntesis", intro);
    bloque("Lectura Evolutiva", signo + " - " + diagnostico);
    bloque("Nivel Energético (Bovis)", "Inicial: " + bovisInicial + " | Final: " + bovisFinal);
    bloque("Conclusión", conclusion);

    // FRASE DESTACADA
    doc.setFont(undefined, "italic");
    doc.setFontSize(11);
    doc.text('"' + frase + '"', 20, y+10, { maxWidth: 170 });
    y += 20;

    // FOOTER
    doc.setDrawColor(180,180,180);
    doc.line(10, y, 200, y);

    y += 10;

    doc.setFont(undefined, "normal");
    doc.text("Con amor,", 10, y);

    y += 6;

    doc.setFont(undefined, "bold");
    doc.text("Clara – Sanación 11.11", 10, y);

    y += 6;

    doc.setFont(undefined, "normal");
    doc.text("+54 9 223 593-1151", 10, y);

    doc.save(nombre + "_informe.pdf");
}
</script>

</body>
</html>
