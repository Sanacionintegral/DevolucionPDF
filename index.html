<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: 'Georgia', serif;
    background: #f7e4ec;
    padding: 20px;
}

input, textarea, select {
    width: 100%;
    margin-bottom: 10px;
    padding: 8px;
}

button {
    width: 100%;
    padding: 12px;
    background: #7a2c7a;
    color: white;
    border: none;
}

/* DISEÑO PDF */
#pdf {
    width: 800px;
    padding: 50px;
    background: linear-gradient(#fff0f5, #ffffff);
}

h1 {
    color: #7a2c7a;
    text-align: center;
}

.section {
    background: white;
    padding: 20px;
    margin-top: 15px;
    border-radius: 10px;
}

.title {
    font-weight: bold;
    color: #7a2c7a;
    margin-bottom: 10px;
}

.quote {
    text-align: center;
    font-style: italic;
    margin-top: 30px;
}
</style>
</head>

<body>

<h2>Generador Nivel Dios</h2>

<input id="nombre" placeholder="Nombre del consultante">

<textarea id="lectura" placeholder="Lectura evolutiva (interpretación)"></textarea>

<input id="bovisInicial" placeholder="Bovis inicial">
<input id="bovisFinal" placeholder="Bovis final">

<textarea id="conclusion" placeholder="Conclusión final"></textarea>

<select id="frase">
<option>Cuando sanás tu pasado, tu presente florece y tu futuro se abre con luz.</option>
<option>Todo lo que liberás hoy, deja espacio para lo nuevo.</option>
<option>Tu energía en equilibrio es tu mayor poder.</option>
</select>

<button onclick="generar()">Generar PDF</button>

<!-- DISEÑO -->
<div id="pdf" style="position:absolute; left:-9999px;">

<h1>Sanación 11.11</h1>
<p style="text-align:center;">Informe energético personalizado</p>

<div class="section">
<div class="title">Consultante</div>
<div id="outNombre"></div>
</div>

<div class="section">
<div class="title">Lectura Evolutiva</div>
<div id="outLectura"></div>
</div>

<div class="section">
<div class="title">Sanación con Péndulo Karnak</div>
<div id="outKarnak"></div>
</div>

<div class="section">
<div class="title">Nivel Energético</div>
<div id="outBovis"></div>
</div>

<div class="section">
<div class="title">Conclusión</div>
<div id="outConclusion"></div>
</div>

<div class="quote" id="outFrase"></div>

<p style="margin-top:40px;">
Con amor,<br>
Clara – Sanación 11.11<br>
+54 9 223 593-1151
</p>

</div>

<script>
function generar() {

let nombre = document.getElementById("nombre").value;
let lectura = document.getElementById("lectura").value;
let conclusion = document.getElementById("conclusion").value;
let frase = document.getElementById("frase").value;

let bIni = document.getElementById("bovisInicial").value;
let bFin = document.getElementById("bovisFinal").value;

// TEXTO AUTOMÁTICO KANRAK (PRO)
let karnak = `
Durante la sesión se realizó un proceso de limpieza y armonización energética mediante Péndulo Karnak.

Se detectaron interferencias que estaban afectando el equilibrio emocional, mental y energético, generando una sensación de sobrecarga interna.

A lo largo del trabajo, estas cargas fueron liberadas progresivamente, permitiendo una reorganización del campo energético y una mejora en la circulación de la energía vital.

Esto favorece una mayor claridad mental, alivio emocional y una sensación de mayor estabilidad interna.
`;

let bovisText = `Nivel inicial: ${bIni} | Nivel final: ${bFin}.
Se observa una elevación significativa en la frecuencia energética, indicando un campo más fuerte, equilibrado y vital.`;

// OUTPUT
document.getElementById("outNombre").innerText = nombre;
document.getElementById("outLectura").innerText = lectura;
document.getElementById("outConclusion").innerText = conclusion;
document.getElementById("outFrase").innerText = frase;
document.getElementById("outKarnak").innerText = karnak;
document.getElementById("outBovis").innerText = bovisText;

// EXPORTAR
html2canvas(document.getElementById("pdf"), {scale:2}).then(canvas=>{
let img = canvas.toDataURL("image/png");
let {jsPDF} = window.jspdf;
let pdf = new jsPDF();
pdf.addImage(img,'PNG',0,0,210,297);
pdf.save(nombre+"_informe.pdf");
});
}
</script>

</body>
</html>
